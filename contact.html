<!DOCTYPE html>
<html>
    <head>
        <title>Contact</title>
        <link href="css/web.css" rel="stylesheet" type="text/css">
        <link href="css/contact.css" rel="stylesheet" type="text/css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </head>
    <body>
        <header>
            <nav class="navigate">
                <a href="/index.html">Home</a>
            </nav>
        </header>
        <div class="front">
            <div class="contactme">
                <h1 id="contact" style="text-align: center">Contact Me</h1>
                <br>
                <ul id="contactlist" style="list-style-type: none;">
                    <li>
                        <a href="https://www.linkedin.com/in/syed-afrid-093877227/" target="_blank">
                            <img src="images/LinkedIn.png" alt="LinkedIn" title="LinkedIn">
                        </a>
                    </li>
                    <li>
                        <a href="https://github.com/s-afrid" target="_blank">
                            <img src="images/github.png" alt="GitHub" title="GitHub">
                        </a>
                    </li>
                    <li>
                        <a href="https://wa.link/mfgm96" target="_blank">
                            <img src="images/whatsapp.png" alt="WhatsApp" title="WhatAapp">
                        </a>
                    </li>
                    <li>
                        <a href="mailto:afrid0052@gmail.com" target="_blank">
                            <img src="images/email.png" alt="Email" title="Email">
                        </a>
                    </li>
                </ul>
            
            </div>
            <div class="messagebox">
                <h1 id="message">Feel free to leave a message</h1>
                <br>
                <form id="box"> 
                    <label for="name">Name: </label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                    <br><br>
                    <label for="email">Email: </label>
                    <input type="text" id="email" name="email" placeholder="Enter your email address" required>
                    <br><br>
                    <label for="phone">Phone No: </label>
                    <input type="text" id="phone" name="phone" placeholder="Enter your phone number" required>
                    <br><br>
                    <label for="yourmessage">Your Message: </label>
                    <textarea id="yourmessage" name="yourmessage" row="6" cols="50" placeholder="Enter your message" required></textarea>
                    <br><br>
                    <button>Submit</button>
                    <br><br>       
                </form>
            </div>
        </div>
    </body>
</html>
